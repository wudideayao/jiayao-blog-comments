<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 — 王佳垚的博客</title>
    <meta name="description" content="王佳垚的个人博客，记录生活、思考与热爱。浏览所有文章。">
    <meta name="keywords" content="王佳垚,博客,文章,生活,思考,音乐,跑步,游戏">

    <!-- Open Graph -->
    <meta property="og:type" content="blog">
    <meta property="og:title" content="文章 — 王佳垚的博客">
    <meta property="og:description" content="王佳垚的个人博客，记录生活、思考与热爱。">
    <meta property="og:url" content="https://wangjiayao.vercel.app/blog">
    <meta property="og:locale" content="zh_CN">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="文章 — 王佳垚的博客">
    <meta name="twitter:description" content="记录生活、思考与热爱。">

    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "王佳垚的博客",
        "description": "记录生活、思考与热爱。",
        "url": "https://wangjiayao.vercel.app/blog",
        "author": {
            "@type": "Person",
            "name": "王佳垚"
        }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome (本地) -->
    <link rel="stylesheet" href="/css/fontawesome/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/blog/css/blog.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="blog-nav">
        <div class="blog-nav-inner">
            <a href="/" class="blog-nav-logo">W.</a>
            <div class="blog-nav-links">
                <a href="/blog/" class="blog-nav-link active">文章</a>
                <a href="/#about" class="blog-nav-link">关于</a>
                <a href="/#contact" class="blog-nav-link">联系</a>
                <button class="theme-toggle-btn" id="blogThemeToggle" aria-label="切换主题">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <header class="blog-header">
        <h1>文章</h1>
        <p>记录生活，分享思考</p>
        <a href="/blog/rss.xml" class="rss-link" target="_blank" rel="noopener">
            <i class="fas fa-rss"></i> RSS
        </a>
    </header>

    <!-- 搜索框 -->
    <div class="blog-main" style="padding-bottom: 0;">
        <div class="blog-search" id="blogSearch">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="搜索文章..." aria-label="搜索文章">
        </div>
    </div>

    <!-- 文章列表 -->
    <main class="blog-main" id="blogMain">
        <div class="blog-filters" id="blogFilters"></div>
        <div class="articles-list" id="articlesContainer">
            <div class="loading-state">
                <div class="loading-spinner-blog"></div>
                <span>加载文章中...</span>
            </div>
        </div>
    </main>

    <!-- 文章详情（由 JS 渲染） -->
    <main class="article-detail" id="articleDetail" style="display: none;"></main>

    <!-- 评论区域（仅在文章详情页显示） -->
    <div class="comments-section" id="commentsSection" style="display: none;">
        <div class="container">
            <div class="comments-inner">
                <h3 class="comments-title">💬 评论</h3>
                <div class="giscus" id="giscus"></div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="/blog/js/blog.js"></script>

    <!-- 初始化主题 -->
    <script>
        (function() {
            var theme = localStorage.getItem('blog-theme');
            if (!theme) {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</body>
</html>
