<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 — 王佳垚的博客</title>
    <meta name="description" content="王佳垚的个人博客，记录生活、思考与热爱。浏览所有文章。">
    <meta name="keywords" content="王佳垚,博客,文章,生活,思考,音乐,跑步,游戏">

    <!-- Open Graph -->
    <meta property="og:type" content="blog">
    <meta property="og:title" content="文章 — 王佳垚的博客">
    <meta property="og:description" content="王佳垚的个人博客，记录生活、思考与热爱。">
    <meta property="og:url" content="https://wangjiayao.vercel.app/blog">
    <meta property="og:locale" content="zh_CN">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="文章 — 王佳垚的博客">
    <meta name="twitter:description" content="记录生活、思考与热爱。">

    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "王佳垚的博客",
        "description": "记录生活、思考与热爱。",
        "url": "https://wangjiayao.vercel.app/blog",
        "author": {
            "@type": "Person",
            "name": "王佳垚"
        }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome (本地) -->
    <link rel="stylesheet" href="/css/fontawesome/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
/* 博客页面样式 - 内联 */
.blog-nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.25rem 0;background:rgba(255,255,255,0.72);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border)}[data-theme="dark"] .blog-nav{background:rgba(10,10,11,0.72)}.blog-nav.scrolled{padding:.75rem 0;box-shadow:0 1px 0 rgba(0,0,0,0.06)}.blog-nav-inner{max-width:1200px;margin:0 auto;padding:0 var(--space-xl);display:flex;align-items:center;justify-content:space-between}.blog-nav-logo{font-family:var(--font-display);font-size:1.25rem;font-weight:700;color:var(--color-text-primary);text-decoration:none}.blog-nav-links{display:flex;align-items:center;gap:1.5rem}.blog-nav-link{font-size:0.875rem;font-weight:500;color:var(--color-text-secondary);text-decoration:none;transition:color var(--transition-base)}.blog-nav-link:hover{color:var(--color-text-primary)}.blog-nav-link.active{color:var(--color-accent-1)}.theme-toggle-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--color-border);border-radius:50%;color:var(--color-text-secondary);font-size:0.875rem;cursor:pointer;transition:all var(--transition-base);background:transparent}.theme-toggle-btn:hover{border-color:var(--color-border-hover);color:var(--color-text-primary);background:var(--color-bg-tertiary)}[data-theme="dark"] .theme-toggle-btn .fa-moon{display:none}[data-theme="dark"] .theme-toggle-btn .fa-sun{display:inline}.theme-toggle-btn .fa-sun{display:none}.blog-header{padding:8rem 0 3rem;text-align:center;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border)}.blog-header h1{font-family:var(--font-display);font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;margin:0 0 0.75rem;letter-spacing:-0.02em;color:var(--color-text-primary)}.blog-header p{font-size:1.0625rem;color:var(--color-text-secondary);margin:0 auto;max-width:500px}.rss-link{display:inline-flex;align-items:center;gap:0.35rem;margin-top:var(--space-lg);font-size:0.8125rem;color:var(--color-text-tertiary);text-decoration:none;transition:color var(--transition-base)}.rss-link:hover{color:#f97316}.rss-link i{font-size:0.875rem}.blog-main{max-width:1200px;margin:0 auto;padding:var(--space-3xl) var(--space-xl)}.blog-search{position:relative;max-width:480px;margin-bottom:var(--space-xl)}.blog-search .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--color-text-tertiary);font-size:0.875rem;pointer-events:none}.blog-search input{width:100%;padding:0.75rem 1rem 0.75rem 2.8rem;font-size:0.9375rem;font-family:inherit;border:1.5px solid var(--color-border);border-radius:var(--radius-full);background:var(--color-bg-card);color:var(--color-text-primary);outline:none;transition:all var(--transition-base)}.blog-search input:focus{border-color:var(--color-accent-1);box-shadow:0 0 0 3px rgba(37,99,235,0.08)}.blog-filters{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:var(--space-2xl);padding-bottom:var(--space-xl);border-bottom:1px solid var(--color-border)}.filter-btn{padding:0.4rem 1rem;font-size:0.8125rem;font-weight:500;border:1px solid var(--color-border);border-radius:var(--radius-full);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all var(--transition-base);font-family:inherit}.filter-btn:hover{border-color:var(--color-border-hover);color:var(--color-text-primary)}.filter-btn.active{background:var(--color-text-primary);color:var(--color-bg-primary);border-color:var(--color-text-primary)}.articles-list{display:flex;flex-direction:column;gap:1.25rem}.article-card{display:block;padding:var(--space-xl) var(--space-2xl);background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);text-decoration:none;color:inherit;transition:all var(--transition-base);cursor:pointer;position:relative;overflow:hidden}.article-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--color-gradient);transition:height var(--transition-base)}.article-card:hover{border-color:var(--color-border-hover);transform:translateX(4px);box-shadow:var(--shadow-md)}.article-card:hover::before{height:100%}.article-meta{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;font-size:0.75rem}.article-date{color:var(--color-text-tertiary)}.article-category{padding:0.15rem 0.6rem;background:var(--color-bg-tertiary);border-radius:var(--radius-full);color:var(--color-accent-1);font-weight:500;font-size:0.6875rem}.article-title{font-family:var(--font-display);font-size:1.25rem;font-weight:600;margin:0 0 0.5rem;line-height:1.4;color:var(--color-text-primary)}.article-summary{font-size:0.9375rem;color:var(--color-text-secondary);line-height:1.7;margin:0}.article-tags{display:flex;gap:0.4rem;margin-top:0.75rem;flex-wrap:wrap}.article-tag{font-size:0.6875rem;color:var(--color-text-tertiary);padding:0.15rem 0.5rem;border:1px solid var(--color-border);border-radius:var(--radius-full)}.no-articles{text-align:center;padding:var(--space-5xl) 0;color:var(--color-text-tertiary)}.no-articles i{font-size:2.5rem;margin-bottom:1rem;opacity:0.5}.loading-state{text-align:center;padding:var(--space-5xl) 0;color:var(--color-text-tertiary)}.loading-spinner-blog{width:32px;height:32px;border:2px solid var(--color-border);border-top-color:var(--color-accent-1);border-radius:50%;animation:spin-blog 0.8s linear infinite;margin:0 auto 1rem}@keyframes spin-blog{to{transform:rotate(360deg)}}.article-detail{max-width:720px;margin:0 auto;padding:7rem var(--space-xl) var(--space-5xl);position:relative}.article-detail::before{content:'';position:fixed;inset:0;background:linear-gradient(135deg,var(--color-bg-secondary) 0%,var(--color-bg-primary) 50%,var(--color-bg-secondary) 100%);z-index:-1}.article-detail-inner{background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-3xl) var(--space-3xl);box-shadow:var(--shadow-lg);position:relative}.article-detail-inner::before{content:'';position:absolute;top:0;left:var(--space-3xl);right:var(--space-3xl);height:3px;background:var(--color-gradient);border-radius:0 0 2px 2px}.article-detail-header{margin-bottom:var(--space-2xl);padding-bottom:var(--space-xl);border-bottom:1px solid var(--color-border)}.article-detail-back{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.875rem;color:var(--color-text-secondary);text-decoration:none;margin-bottom:var(--space-lg);transition:color var(--transition-base)}.article-detail-back:hover{color:var(--color-accent-1)}.article-detail-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;line-height:1.3;margin:0 0 1rem;letter-spacing:-0.02em;color:var(--color-text-primary)}.article-detail-meta{display:flex;align-items:center;gap:1rem;font-size:0.875rem;color:var(--color-text-secondary);flex-wrap:wrap}.article-detail-body{font-size:1.0625rem;line-height:2;color:var(--color-text-primary)}.article-detail-body h2{font-family:var(--font-display);font-size:1.5rem;font-weight:600;margin:2.5rem 0 1rem;padding-bottom:0.5rem;border-bottom:2px solid var(--color-border)}.article-detail-body h3{font-family:var(--font-display);font-size:1.2rem;font-weight:600;margin:2rem 0 0.75rem}.article-detail-body p{margin:0 0 1.25rem;text-indent:2em}.article-detail-body blockquote{margin:1.5rem 0;padding:1.25rem 1.5rem;border-left:3px solid var(--color-accent-1);background:var(--color-bg-tertiary);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--color-text-secondary);font-style:italic;position:relative}.article-detail-body blockquote::before{content:'\201C';font-size:3rem;color:var(--color-accent-1);opacity:0.3;position:absolute;top:-0.5rem;left:0.5rem;font-family:Georgia,serif;line-height:1}.article-detail-body blockquote p{margin:0;text-indent:0}.article-detail-body ul,.article-detail-body ol{margin:0 0 1.25rem;padding-left:2.5rem}.article-detail-body li{margin-bottom:0.5rem;line-height:1.8}.article-detail-body hr{margin:2.5rem 0;border:none;border-top:2px dashed var(--color-border)}.article-detail-body strong{color:var(--color-text-primary)}.article-detail-body code{font-size:0.875rem;background:var(--color-bg-tertiary);padding:0.15rem 0.4rem;border-radius:4px;font-family:'SF Mono','Cascadia Code',monospace}.article-detail-footer{margin-top:var(--space-2xl);padding-top:var(--space-xl);border-top:1px solid var(--color-border);text-align:right;font-family:var(--font-display);font-size:0.875rem;color:var(--color-text-tertiary)}@media(max-width:768px){.blog-header{padding:6rem 0 2rem}.article-card{padding:var(--space-lg)}.article-detail{padding:6rem var(--space-lg) var(--space-4xl)}.blog-nav-inner{padding:0 var(--space-lg)}.blog-main{padding:var(--space-2xl) var(--space-lg)}}@media(max-width:480px){.article-title{font-size:1.0625rem}.article-summary{font-size:0.875rem}.blog-filters{gap:0.4rem}.filter-btn{font-size:0.75rem;padding:0.3rem 0.75rem}}
</style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="blog-nav">
        <div class="blog-nav-inner">
            <a href="/" class="blog-nav-logo">W.</a>
            <div class="blog-nav-links">
                <a href="/blog/" class="blog-nav-link active">文章</a>
                <a href="/#about" class="blog-nav-link">关于</a>
                <a href="/#contact" class="blog-nav-link">联系</a>
                <button class="theme-toggle-btn" id="blogThemeToggle" aria-label="切换主题">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <header class="blog-header">
        <h1>文章</h1>
        <p>记录生活，分享思考</p>
        <a href="/blog/rss.xml" class="rss-link" target="_blank" rel="noopener">
            <i class="fas fa-rss"></i> RSS
        </a>
    </header>

    <!-- 搜索框 -->
    <div class="blog-main" style="padding-bottom: 0;">
        <div class="blog-search" id="blogSearch">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="搜索文章..." aria-label="搜索文章">
        </div>
    </div>

    <!-- 文章列表 -->
    <main class="blog-main" id="blogMain">
        <div class="blog-filters" id="blogFilters"></div>
        <div class="articles-list" id="articlesContainer">
            <div class="loading-state">
                <div class="loading-spinner-blog"></div>
                <span>加载文章中...</span>
            </div>
        </div>
    </main>

    <!-- 文章详情（由 JS 渲染） -->
    <main class="article-detail" id="articleDetail" style="display: none;"></main>

    <!-- 评论区域（仅在文章详情页显示） -->
    <div class="comments-section" id="commentsSection" style="display: none;">
        <div class="container">
            <div class="comments-inner">
                <h3 class="comments-title">💬 评论</h3>
                <div class="giscus" id="giscus"></div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="/blog/js/blog.js"></script>

    <!-- 初始化主题 -->
    <script>
        (function() {
            var theme = localStorage.getItem('blog-theme');
            if (!theme) {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</body>
</html>
