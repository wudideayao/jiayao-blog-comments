var C = {
"hello-world":"## 为什么写博客？\n\n一直以来，我都是一个喜欢思考的人。走在路上、跑步时、睡前躺在床上，脑子里总会冒出各种各样的想法。有些想法转瞬即逝，有些则反复出现。\n\n我想，是时候把这些想法记录下来了。\n\n## 关于这个博客\n\n这里不会有太多技术性的内容，更多的是关于：\n\n- **生活感悟** — 对日常生活的观察和思考\n- **兴趣爱好** — 音乐、跑步、游戏的分享\n- **阅读笔记** — 读书后的感想和收获\n- **偶尔的随笔** — 想到什么写什么\n\n## 一个小小的承诺\n\n我会尽量保持更新，不追求数量，但求每一篇都有温度。\n\n> 生活不是我们活过的日子，而是我们记住的日子。\n> — 加西亚·马尔克斯\n\n希望多年后回看这些文字，能会心一笑，想起此刻的自己。",
"running-and-life":"## 跑步教会我的三件事\n\n从大学开始跑步到现在，我已经记不清跑过了多少公里。但跑步教会我的那些事，却一直刻在脑海里。\n\n### 1. 坚持的力量\n\n刚开始跑步的时候，一公里就觉得要死了。腿像灌了铅，肺像要炸开。但我告诉自己：再坚持一下，就一下。\n\n然后神奇的事情发生了——慢慢地，一公里变成了三公里，三公里变成了五公里，五公里变成了十公里。\n\n> 跑步最难的时刻，永远是穿上鞋出门的那一刻。\n\n### 2. 与自己对话\n\n跑步是我和自己独处的时光。没有手机，没有干扰，只有脚步声和呼吸声。\n\n在这段时间里，我会想很多事：今天过得怎么样？有什么问题需要解决？未来的路要怎么走？\n\n很多时候，困扰我很久的问题，跑着跑着就想通了。\n\n### 3. 享受过程而非结果\n\n最开始跑步，我盯着配速、距离、卡路里。后来我发现，当我不再执着于数据，而是专注于呼吸和步伐时，跑步变成了一种享受。\n\n人生也是如此。不必太在意终点在哪里，路上的风景同样值得欣赏。\n\n---\n\n如果你也在考虑开始跑步，我的建议是：别想太多，穿上鞋，出门跑起来就好。",
"music-in-my-life":"## 我的音乐之旅\n\n如果说生活是一幅画，那音乐就是它的背景色。\n\n### 初识\n\n小时候第一次听到周杰伦的《晴天》，那时候还不知道什么是流行音乐，只是觉得旋律好听。现在每次听到前奏响起，还是会想起那个夏天的午后。\n\n### 探索\n\n长大后开始听更多类型的音乐。\n\n- **古典乐** — 贝多芬、肖邦、德彪西，每一个音符都像在讲故事\n- **爵士** — 在雨天的咖啡馆里，一杯拿铁，一段即兴钢琴\n- **电子** — 跑步时的最佳伴侣，节奏和步伐完美同步\n- **后摇** — 深夜写作时的背景音，宏大而孤独\n\n### 现在的习惯\n\n现在的我，每天通勤时听新歌单，跑步时听节奏感强的音乐，写作时听轻音乐或后摇。\n\n音乐已经成了我生活中最自然的一部分。它不需要被刻意提起，因为它一直都在。\n\n> 没有音乐的生活是一种错误。\n> — 尼采\n\n你呢？最近在听什么歌？",
"game-world":"## 为什么喜欢游戏？\n\n很多人觉得游戏是浪费时间。但对我来说，游戏是一种**体验**。\n\n### 不同的世界\n\n每一款好游戏都是一个全新的世界：\n\n- **《求生之路 2》** — 和朋友们一起对抗丧尸的快乐，是任何单机游戏都给不了的\n- **《三角洲行动》** — 战术配合的紧张感，每一步都关乎生死\n- **《王者荣耀》** — 五个人齐心协力推掉对面水晶的那一刻，所有的配合都值得了\n\n### 游戏教会我的事\n\n1. **团队合作** — 一个人再强也赢不了，真正重要的是配合\n2. **永不言弃** — 水晶没爆之前，一切皆有可能\n3. **策略思维** — 什么时候进攻，什么时候撤退，生活也是一样\n\n### 适度游戏\n\n当然，游戏只是生活的一部分。工作、跑步、读书、社交，这些同样重要。\n\n> 游戏结束后的世界，才是真实的人生。但游戏里学到的勇气和智慧，可以带到现实中。\n\n保持平衡，享受每一种体验。",
"beauty-in-daily":"## 美，一直都在\n\n你有没有过这样的时刻？\n\n放学回家的路上，突然看到天边绚烂的晚霞，忍不住停下来拍照。那一刻，所有的疲惫都消失了。\n\n这就是我想说的——**美不需要刻意寻找**。\n\n### 我眼中的美\n\n- **日落** — 每天的天空都是一幅不同的画\n- **咖啡** — 手冲时水流的声音，咖啡粉膨胀的样子\n- **设计** — 一个好的 UI 设计，简洁而优雅\n- **文字** — 一句说到心坎里的话\n- **微笑** — 陌生人的善意\n\n### 为什么我们要欣赏美\n\n生活中总会有烦恼和压力。但如果我们只盯着这些，生活会变得很累。\n\n美，是生活的调味剂。它不会解决你的问题，但能让你在面对问题时，有一个更好的心态。\n\n> 世界上不缺少美，而是缺少发现美的眼睛。\n> — 罗丹\n\n从今天开始，试着留意身边那些美好的小事物吧。也许只是一片落叶，但它的纹理和颜色，真的很美。",
"thinking-about-life":"## 写在前面\n\n18岁，是一个很奇妙的年纪。\n\n刚刚参加完高考，结束了十二年的学生生涯。回头一看，那些刷题到深夜的日子、和同学在走廊打闹的课间、每次大考前紧张到手心出汗的感觉——都变成了回忆。\n\n向前看，大学生活在等着我，未来有太多的未知和可能。\n\n### 关于高考\n\n高考这件事，经历过的人都知道有多煎熬。\n\n但我现在回头看，发现高考最重要的不是那张成绩单，而是它教会了我两件事：\n\n1. **坚持** — 三年如一日的早起晚睡，让我知道了自己原来可以这么拼\n2. **心态** — 模考考砸了、大题不会做，这些都没什么大不了的，明天太阳照常升起\n\n### 关于选择\n\n18岁最大的不同，就是要开始自己做决定了。\n\n选什么专业？去哪个城市？要不要复读？\n\n说实话，我也挺迷茫的。但我觉得，迷茫本身不是坏事——它意味着你有选择的权利。\n\n> 人生不是被给定的，而是被选择出来的。\n\n### 关于未来\n\n我不知道大学四年会怎样，也不知道毕业后会做什么。\n\n但这没关系。\n\n我才18岁，有足够的时间去尝试、去犯错、去找到自己真正热爱的事情。\n\n### 关于这个博客\n\n这个博客就是我18岁的一个记录。\n\n我想在这里写下我的想法、我的爱好、我的成长。等几年后再回来看，应该会很有意思吧。\n\n好了，第一篇正经文章就写到这里。以后会慢慢更新学车日记、技术笔记和生活随想的 🚀",
"hello-world-astro":"## 终于把博客搭起来了！\n\n折腾了一上午，用 Astro 搭了这个博客，参考了 Apple 的设计风格——简洁、干净、内容优先。\n\n### 为什么写博客？\n\n- 记录学技术的历程\n- 分享生活中的想法\n- 练练写作能力\n\n好了，第一篇就这样，以后会慢慢更新的 🚀",
"deploy-journey":"## 从零开始\n\n其实最开始想法很简单——就想搭个自己的博客，写写文章记录生活。\n\n搞了个个人主页，又在 Astro 里搭了这个博客。先是扔到了 Vercel 上，然后问题来了：Vercel 在国内访问不了。\n\n那还是用阿里云吧。正好有台体验服务器，Ubuntu 系统。\n\n## 开始踩坑\n\n装完 Nginx 配置好网站目录，自我感觉良好。然后打开了 UFW 防火墙——然后 SSH 断了。\n\n对，忘了先放行 22 端口。还好阿里云有 VNC 控制台，进去 ufw allow 22/tcp 救了回来。\n\n以为这就完了？阿里云还有层安全组，要在网页控制台里加 HTTP(80) 的入方向规则。\n\n## 一点感想\n\n以前觉得部署网站是件很复杂的事，真正动手折腾下来，发现也就是一步步排查问题、搜解决方案的过程。\n\n好了，这篇就写到这里 🚀",
"laptop-guide":"## 为什么会做这个\n\n高考完了，第一件事不是狂欢，是买电脑。\n\n但笔记本这玩意儿吧，型号多到离谱。想买个适合大学生的，网上一搜全是软文、带货。我翻了整整两天，越看越懵。\n\n然后就冒出一个想法：为什么不自己做个选购工具？\n\n## 技术选型\n\n- **前端**: 纯 HTML + CSS + 原生 JS\n- **后端**: Flask + SQLite\n- **部署**: 和博客共用一台阿里云 ECS\n\n### 七维筛选器\n\n机型库最大的难题是筛选。CPU、显卡型号太多了，不能只给关键字搜索。\n\n于是设计了七个维度：预算、品牌、CPU 档位、显卡类型、内存大小、储存容量、使用场景。每个维度点一下就过滤，筛选组合即时生效。\n\n## 实际效果\n\n现在网站上有 94 款机型，覆盖了市面上大部分主流笔记本。如果你也需要选大学用的笔记本，可以来逛逛！"
