server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name jiayao-bili.duckdns.org _;

    location /.well-known/acme-challenge/ {
        root /var/www/jiayao-space;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name jiayao-bili.duckdns.org _;

    ssl_certificate /etc/letsencrypt/live/jiayao-bili.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiayao-bili.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/music/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10;
        proxy_read_timeout 30;
    }

    location / {
        root /var/www/jiayao-space;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /blog/ {
        root /var/www/jiayao-blog;
        index index.html;
        try_files $uri $uri/ /blog/index.html;
    }

    # 主站静态资源
    location ~ ^/(css|js|images)/.*\.(css|js|svg|png|jpg|jpeg|ico)$ {
        root /var/www/jiayao-space;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 博客静态资源
    location ~ ^/blog/(css|js|data)/ {
        root /var/www/jiayao-blog;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    location /laptop/ {
        alias /var/www/laptop-guide/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /laptop/api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /roast/ {
        alias /var/www/bilibili-roast/;
        index index.html;
        try_files $uri $uri/ /roast/index.html;
    }

    location /roast/api/bilibili/ {
        proxy_pass https://api.bilibili.com/;
        proxy_set_header Host api.bilibili.com;
    }

    location /roast/api/v2/ {
        proxy_pass http://127.0.0.1:3456/api/;
        proxy_connect_timeout 10;
        proxy_read_timeout 120s;
    }
}
