# ===== jiayao-bili.duckdns.org (原项目) =====
server {
    listen 80;
    listen [::]:80;
    server_name jiayao-bili.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/jiayao-space;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jiayao-bili.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/jiayao-bili.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiayao-bili.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/music/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10;
        proxy_read_timeout 30;
    }

    location /laptop/ {
        alias /var/www/laptop-guide/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /laptop/api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /laptop/admin {
        proxy_pass http://127.0.0.1:5000/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /laptop/admin/ {
        proxy_pass http://127.0.0.1:5000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /roast/ {
        alias /var/www/bilibili-roast/;
        index index.html;
        try_files $uri $uri/ /roast/index.html;
    }

    location /roast/api/bilibili/ {
        proxy_pass https://api.bilibili.com/;
        proxy_set_header Host api.bilibili.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent bilibili-roast-proxy;
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    location /roast/api/v2/ {
        proxy_pass http://127.0.0.1:3456/api/;
        proxy_connect_timeout 10;
        proxy_read_timeout 120s;
    }

    location / {
        root /var/www/jiayao-space;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

# ===== 博客 (通过 IP 访问) =====
server {
    listen 80;
    listen [::]:80;
    server_name 121.43.35.59;

    root /var/www/jiayao-space;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /blog/ {
        root /var/www/jiayao-blog;
        index index.html;
        try_files $uri $uri/ /blog/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /blog/api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10;
        proxy_read_timeout 30;
    }

    location /api/music/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10;
        proxy_read_timeout 30;
    }

    location = /blog/hello-world/ { return 301 /blog/?article=hello-world-astro; }
    location = /blog/deploy-journey/ { return 301 /blog/?article=deploy-journey; }
    location = /blog/laptop-guide/ { return 301 /blog/?article=laptop-guide; }

    location ~* \.(css|js|svg|png|jpg|jpeg|ico|woff2?)$ {
        root /var/www/jiayao-space;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /laptop/ {
        alias /var/www/laptop-guide/;
        index index.html;
        try_files $uri $uri/ =404;
        expires 7d;
    }

    location /laptop/api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /laptop/admin {
        proxy_pass http://127.0.0.1:5000/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /laptop/admin/ {
        proxy_pass http://127.0.0.1:5000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /roast/ {
        alias /var/www/bilibili-roast/;
        index index.html;
        try_files $uri $uri/ /roast/index.html;
        expires 7d;
    }

    location /roast/api/v2/ {
        proxy_pass http://127.0.0.1:3456/api/;
        proxy_connect_timeout 10;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
